# Repo root = Python package (eval/, llm_evaluator.py, requirements.txt at top level).
# Manual run: Actions → Security Agent — Eval Pipeline → Run workflow.

name: Security Agent — Eval Pipeline

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - "eval/**"
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/eval.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "eval/**"
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/eval.yml"
  workflow_dispatch:
    inputs:
      model:
        description: "litellm model string (e.g. openai/gpt-4o-mini)"
        required: false
        default: "openai/gpt-4o-mini"
      verdict_accuracy_threshold:
        description: "Minimum binary verdict accuracy (0–1)"
        required: false
        default: "0.85"

jobs:
  eval:
    name: LLM-as-a-Judge Evaluation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPEVAL_MODEL: gpt-4o
          LLM_MODEL: ${{ github.event.inputs.model || 'openai/gpt-4o-mini' }}
        run: |
          python eval/eval_runner.py \
            --verdict-accuracy-threshold ${{ github.event.inputs.verdict_accuracy_threshold || '0.85' }}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: .deepeval-cache.json
          if-no-files-found: ignore
